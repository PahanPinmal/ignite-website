<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignite Sri Lanka | Projects</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: "Inter", sans-serif;
            transition: opacity 0.5s ease;
        }

        /* LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .loader-circle {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top: 4px solid #7a1c1c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* HERO */
        .hero {
            position: relative;
            height: 60vh;
            background: url("yearsbg.jpeg") center/cover no-repeat;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.55);
        }

        /* CARD */
        .card {
            overflow: hidden;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
            border-radius: 16px;
        }

        .card img {
            transition: transform 0.5s ease;
        }

        /* DEFAULT OVERLAY (LIGHT) */
        .overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.3), transparent 60%);
            transition: 0.4s ease;
        }

        /* HOVER → DARK BOTTOM GRADIENT */
        .card:hover .overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75), transparent 60%);
        }

        .card:hover img {
            transform: scale(1.08);
        }

        /* CONTENT */
        .card-content {
            transform: translateY(10px);
            transition: 0.4s ease;
        }

        .card:hover .card-content {
            transform: translateY(0);
        }

        /* BUTTON */
        .btn {
            border: 1px solid white;
            padding: 5px 14px;
            font-size: 12px;
            border-radius: 20px;
            margin-top: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s ease;
        }

        .card:hover .btn {
            opacity: 1;
            transform: translateY(0);
        }

        .btn:hover {
            background: white;
            color: black;
        }

        /* RIPPLE */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(255, 255, 255, 0.5);
            animation: ripple-effect 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>

</head>

<body class="bg-white text-gray-1000">

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-circle"></div>
    </div>

    <!-- HERO -->
    <section class="hero flex items-center justify-center">

        <div class="absolute top-6 w-full flex justify-between px-10 z-10">
            <img src="logo.png" class="h-20 md:h-24">
            <img src="RACUOKB.png" class="h-16 md:h-20">
        </div>

        <div class="relative z-10 text-center">

            <h1 class="text-3xl md:text-4xl font-semibold mb-3">
                Ignite ஸ்ரீ ලංකා
            </h1>

            <p class="text-gray-600 mb-6 text-sm">
                Browse all Ignite Sri Lanka initiatives and milestones
            </p>

            <div class="flex bg-white shadow-lg rounded-full overflow-hidden w-[90%] md:w-[600px] mx-auto">
                <input id="searchInput" type="text" placeholder="Search projects..."
                    class="px-6 py-3 w-full outline-none text-sm">
                <button class="px-6 bg-[#7a1c1c] text-white text-sm ripple-btn">
                    Search
                </button>
            </div>

        </div>

    </section>


    <!-- SECTION -->
    <section class="py-16">

        <div id="cardContainer"
            class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 px-6">

            <a href="ignite1.html" class="card ripple-btn">
                <img src="ISL1.0RE.jpeg" class="w-full h-56 object-cover">
                <div class="overlay absolute inset-0 flex items-end p-4 text-white">
                    <div class="card-content">
                        <h3 class="font-bold text-sm">Ignite Sri Lanka 1.0</h3>
                        <p class="text-xs opacity-80">Research</p>
                        <button class="btn">Browse</button>
                    </div>
                </div>
            </a>

            <a href="ignite1-research.html" class="card ripple-btn">
                <img src="ISL1.0.jpeg" class="w-full h-56 object-cover">
                <div class="overlay absolute inset-0 flex items-end p-4 text-white">
                    <div class="card-content">
                        <h3 class="font-bold text-sm">Ignite Sri Lanka 1.0</h3>
                        <p class="text-xs opacity-80">Project</p>
                        <button class="btn">Browse</button>
                    </div>
                </div>
            </a>

            <a href="ISL2.0.html" class="card ripple-btn">
                <img src="ISL2.0RE.jpeg" class="w-full h-56 object-cover">
                <div class="overlay absolute inset-0 flex items-end p-4 text-white">
                    <div class="card-content">
                        <h3 class="font-bold text-sm">Ignite Sri Lanka 2.0</h3>
                        <p class="text-xs opacity-80">Research</p>
                        <button class="btn">Browse</button>
                    </div>
                </div>
            </a>

            <a href="ISL2.0.html" class="card ripple-btn">
                <img src="ISL2.0.jpeg" class="w-full h-56 object-cover">
                <div class="overlay absolute inset-0 flex items-end p-4 text-white">
                    <div class="card-content">
                        <h3 class="font-bold text-sm">Ignite Sri Lanka 2.0</h3>
                        <p class="text-xs opacity-80">Project</p>
                        <button class="btn">Browse</button>
                    </div>
                </div>
            </a>

        </div>

    </section>

    <script>
        window.addEventListener("load", () => {
            const loader = document.getElementById("loader");
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 600);
        });

        document.querySelectorAll('.ripple-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                let ripple = document.createElement("span");
                ripple.classList.add("ripple");
                ripple.style.left = e.offsetX + "px";
                ripple.style.top = e.offsetY + "px";
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        document.querySelectorAll("a").forEach(link => {
            link.addEventListener("click", function (e) {
                if (this.href) {
                    e.preventDefault();
                    document.body.style.opacity = "0";
                    setTimeout(() => {
                        window.location = this.href;
                    }, 400);
                }
            });
        });

        const searchInput = document.getElementById("searchInput");
        const cards = document.querySelectorAll(".card");

        searchInput.addEventListener("keyup", function () {
            let value = this.value.toLowerCase();

            cards.forEach(card => {
                let name = card.innerText.toLowerCase();
                if (name.includes(value)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        });
    </script>

</body>

</html>
